<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简测试版 - 菲伦</title>
    
    <!-- 1. PixiJS 渲染引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/pixi.min.js"></script>
    
    <!-- 2. Live2D 核心库 (采用全球最稳定的开源社区镜像，国内不卡，绝对真包) -->
    <script src="https://fastly.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2dcubismcore.min.js"></script>
    
    <!-- 3. Live2D 桥接显示插件 -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
</head>
<body style="margin: 0; background-color: #f3eff7; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;">

    <!-- 唯一的一个画板 -->
    <canvas id="canvas"></canvas>

    <script>
        // ⚠️ 绝对正确的你的专属仓库地址！外加防缓存时间戳
        const modelUrl = 'https://yuegu-0330.github.io/fern-pet/fern.model3.json?nocache=' + new Date().getTime();

        const canvas = document.getElementById('canvas');
        const app = new PIXI.Application({
            view: canvas,
            width: window.innerWidth,
            height: window.innerHeight,
            transparent: true,
            resolution: window.devicePixelRatio || 1,
        });

        // 极简暴力的加载逻辑：不搞提示框，只管加载
        PIXI.live2d.Live2DModel.from(modelUrl)
            .then(model => {
                app.stage.addChild(model);
                
                // 设置半身像的大小和位置
                const scale = window.innerWidth < 600 ? 0.15 : 0.20; 
                model.scale.set(scale);
                model.anchor.set(0.5, 0.5);
                model.x = app.renderer.width / 2;
                model.y = app.renderer.height / 2 + 100;
                
                // 成功后弹窗庆祝
                alert("🎉 恭喜！模型加载成功！");
            })
            .catch(err => {
                // 失败后直接把最底层的核心报错弹出来
                alert("❌ 加载失败，原因: " + err.message);
            });
    </script>
</body>
</html>
